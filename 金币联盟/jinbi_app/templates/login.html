{% extends 'base.html' %}
{% block title %}会员登录 · 金币联盟{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-eyebrow">SIGN IN</div>
  <h1 class="auth-title">欢迎回到金币联盟</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ 'error' if cat == 'error' else 'ok' }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="post" novalidate>
    <div class="field">
      <label for="phone">手机号</label>
      <input id="phone" name="phone" type="tel" inputmode="numeric"
             pattern="\d{11}" maxlength="11" placeholder="请输入 11 位手机号" required>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" minlength="6"
             placeholder="至少 6 位" required>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-muted)">
      <input id="remember" name="remember" type="checkbox" style="width:auto">
      <label for="remember" style="margin:0;cursor:pointer">记住登录状态</label>
    </div>
    <div class="auth-actions">
      <button type="submit" class="btn btn-primary">登 录</button>
    </div>
    <div class="auth-foot">
      还没账号？<a href="{{ url_for('register') }}">免费注册</a>
    </div>
  </form>
</div>
{% endblock %}
