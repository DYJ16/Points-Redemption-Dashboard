{% extends 'base.html' %}
{% block title %}帮助中心 · 金币联盟{% endblock %}

{% block content %}
<section class="section" style="padding-top:50px">
  <div class="container">
    <div class="section-head">
      <h2 class="section-title">
        <span class="num">07</span>
        帮助中心
      </h2>
      <span class="section-meta">新手引导 · 常见问题 · 联系我们</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:24px">
      {% for group, items in groups.items() %}
      <div class="info-card">
        <h3 class="info-card-title">{{ group }}</h3>
        <ul class="info-list">
          {% for h in items %}
          <li>
            <span class="dot">◆</span>
            <span style="font-size:14px;font-weight:500;color:var(--ink)">{{ h.title }}</span>
          </li>
          <li style="padding:6px 0 12px 22px;font-size:13px;color:var(--ink-muted);line-height:1.7">
            {{ h.body }}
          </li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
