{% extends 'base.html' %}
{% block title %}修改密码 · 金币联盟{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-eyebrow">SECURITY</div>
  <h1 class="auth-title">修改密码</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ 'error' if cat == 'error' else 'ok' }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="post" novalidate>
    <div class="field">
      <label>原密码</label>
      <input name="old_password" type="password" required>
    </div>
    <div class="field">
      <label>新密码</label>
      <input name="new_password" type="password" minlength="6" required>
    </div>
    <div class="field">
      <label>确认新密码</label>
      <input name="new_password2" type="password" minlength="6" required>
    </div>
    <div class="auth-actions">
      <button type="submit" class="btn btn-primary">提 交</button>
    </div>
    <div class="auth-foot">
      <a href="{{ url_for('user_center') }}">← 返回个人中心</a>
    </div>
  </form>
</div>
{% endblock %}
